# Dependabot-Konfiguration.
# Diese Integration hat keine eigenen Paket-Manifeste (die Python-Abhängigkeit
# `openai` wird über HA's manifest.json verwaltet, das Dependabot nicht liest).
# Überwacht werden daher GitHub Actions, falls künftig CI-Workflows dazukommen.
# Sicherheitswarnungen für Abhängigkeiten laufen unabhängig hiervon über die
# Repo-Sicherheitseinstellungen (Dependabot Alerts).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
